<!doctype html>
<html lang="bg">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#047857" />
    <title>AgriNexus.Law</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          linear-gradient(rgba(15, 23, 42, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(15, 23, 42, 0.04) 1px, transparent 1px),
          linear-gradient(180deg, #fbfaf7 0%, #eef6ef 100%);
        background-size: 42px 42px, 42px 42px, auto;
        color: #0f172a;
      }

      main {
        width: min(520px, calc(100vw - 32px));
        border: 1px solid rgba(15, 23, 42, 0.12);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.86);
        padding: 28px;
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.14);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 900;
        letter-spacing: 0.14em;
      }

      .mark {
        display: grid;
        width: 42px;
        height: 42px;
        place-items: center;
        border-radius: 8px;
        background: #064e3b;
        color: white;
      }

      h1 {
        margin: 28px 0 10px;
        font-size: clamp(28px, 8vw, 44px);
        line-height: 1;
        letter-spacing: -0.04em;
      }

      p {
        margin: 0;
        color: #475569;
        line-height: 1.7;
      }

      a {
        display: inline-flex;
        margin-top: 22px;
        border-radius: 8px;
        background: #047857;
        padding: 12px 16px;
        color: white;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand"><span class="mark">A</span> AGRINEXUS.LAW</div>
      <h1>Зареждане на платформата</h1>
      <p>Мобилното приложение използва защитената production версия на AgriNexus.Law. Ако пренасочването не започне автоматично, отвори платформата ръчно.</p>
      <a href="https://agrinexuslaw.com">Отвори AgriNexus.Law</a>
    </main>
    <script>
      window.setTimeout(function () {
        window.location.replace("https://agrinexuslaw.com");
      }, 500);
    </script>
  </body>
</html>
