<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
	<title>Analysis archive | Furrow Markets</title>
	<meta name="description" content="Furrow Markets — archive of desk longreads and seasonal outlooks.">
	<link rel="stylesheet" href="styles/article.css">
	<style>
		.archive-list {
			list-style: none;
			padding: 0;
			margin: 24px 0 0;
			font-family: system-ui, -apple-system, sans-serif;
		}
		.archive-list > li {
			padding: 18px 0;
			border-bottom: 1px solid #e2e8f0;
		}
		.archive-list a {
			color: #1a2a3a;
			text-decoration: none;
			font-weight: 600;
			font-size: 17px;
		}
		.archive-list a:hover {
			color: #2c5f2d;
		}
		.archive-meta {
			font-size: 13px;
			color: #64748b;
			margin-top: 6px;
		}
		.archive-page-btn {
			padding: 8px 16px;
			background: #fff;
			border: 1px solid #e2e8f0;
			cursor: pointer;
			font-family: inherit;
			font-weight: 500;
		}
		.archive-page-btn:disabled {
			opacity: 0.5;
			cursor: not-allowed;
		}
	
        /* Mobile Nav & Layout Fix */
        @media (max-width: 992px) {
            nav {
                flex-wrap: wrap;
                gap: 16px;
                padding: 16px !important;
                justify-content: center !important;
                text-align: center;
            }
            nav > a.logo {
                width: 100%;
                justify-content: center;
                margin-bottom: 8px;
            }
            nav > div {
                flex-wrap: wrap;
                justify-content: center;
                gap: 12px !important;
                width: 100%;
            }
            nav > div[style*="margin-left: auto"] {
                margin: 12px 0 !important;
                width: 100%;
                justify-content: center;
            }
            body {
                overflow-x: hidden;
            }
            .container {
                max-width: 100%;
                padding: 0 16px;
            }
        }

    
        /* Comprehensive Mobile Layout Fixes */
        html, body {
            max-width: 100vw;
            overflow-x: hidden;
            position: relative;
        }
        
        * {
            box-sizing: border-box;
        }

        @media (max-width: 768px) {
            /* General Typography & Hero */
            .hero { padding: 60px 0 30px !important; }
            .hero h1 { font-size: 36px !important; letter-spacing: -1px !important; }
            .hero p { font-size: 16px !important; }
            
            /* Index (Agents) specific */
            .stats-strip { 
                flex-wrap: wrap !important; 
                gap: 24px !important; 
                padding: 24px 0 !important; 
                margin-bottom: 40px !important;
            }
            .stat-item { width: 40%; }
            .mesh-container { height: 400px !important; margin-bottom: 60px !important; }
            .orbit { display: none; /* Hide orbits on mobile to avoid overflow and clutter */ }
            .ladder-grid { grid-template-columns: 1fr !important; }
            
            /* Platform specific */
            .arch-card { padding: 24px 16px !important; }
            .arch-row { 
                flex-direction: column !important; 
                align-items: center !important; 
                padding: 24px 16px !important;
                gap: 24px !important;
            }
            .row-label, .row-meta { 
                width: 100% !important; 
                text-align: center !important; 
            }
            .nodes-container { 
                flex-wrap: wrap !important; 
                justify-content: center !important; 
                gap: 24px !important; 
            }
            .integrations-grid { grid-template-columns: 1fr 1fr !important; gap: 16px !important; }
            .foundation-grid { grid-template-columns: 1fr !important; }
            
            /* Market Intelligence specific */
            .ticker-strip { width: 100vw; position: relative; left: 50%; right: 50%; margin-left: -50vw; margin-right: -50vw; }
            .engine-grid, .signal-grid { grid-template-columns: 1fr !important; }
            .split-hero { flex-direction: column !important; }
            
            /* Academy specific */
            .hero.split { flex-direction: column !important; }
            .reading-layout { flex-direction: column !important; }
            .paths-grid, .fresh-grid { grid-template-columns: 1fr !important; gap: 16px !important; }
            
            /* Dashboard specific */
            .dashboard-layout { flex-direction: column !important; }
            .sidebar { width: 100% !important; border-right: none !important; border-bottom: 1px solid var(--border); padding: 16px !important; }
            .dash-grid { grid-template-columns: 1fr !important; }
        }

    </style>
</head>
<body data-i18n-title="arc.page.title">

<nav class="article-nav">
	<a href="/" class="article-logo">FURROW MARKETS</a>
	<div class="article-nav-right">
		<div class="article-nav-links">
			<a href="/" data-i18n="arc.nav.home">Home</a>
			<a href="/ukraine-harvest-war" data-i18n="arc.nav.ukraine">Ukraine Harvest 2026</a>
			<a href="/egypt-fields-desert-oasis-2026" data-i18n="arc.nav.egypt">Egypt</a>
			<a href="/archive" class="active" data-i18n="arc.nav.archive">Archive</a>
			<a href="/sponsor" data-i18n="arc.nav.sponsor">Sponsor</a>
			<a href="/register" data-i18n="arc.nav.register">Register</a>
		</div>
		<div class="article-lang-switch lang-switch">
			<a href="#" data-lang="en" class="active">EN</a>
			<a href="#" data-lang="bg">BG</a>
		</div>
	</div>
</nav>

<article class="article-container">
	<div class="article-kicker" data-i18n="arc.kicker">Furrow desk</div>
	<h1 data-i18n="arc.h1">Analysis archive</h1>
	<p class="article-lead" data-i18n="arc.lead">
		Long-form desk notes and seasonal outlooks published on Furrow Markets.
	</p>

	<div class="archive-controls" style="display: flex; gap: 16px; margin: 24px 0;">
		<input type="text" id="archive-search" placeholder="Search articles..." style="flex: 1; padding: 10px; border: 1px solid #e2e8f0; font-family: inherit; font-size: 15px;">
		<select id="archive-category" style="padding: 10px; border: 1px solid #e2e8f0; font-family: inherit; font-size: 15px; background: white;">
			<option value="all">All Categories</option>
			<option value="north-america">North America</option>
			<option value="europe">Europe</option>
			<option value="mena">MENA</option>
			<option value="global">Global Analysis</option>
		</select>
	</div>

	<h2 data-i18n="arc.h2.desk">Desk longreads</h2>
	<ul class="archive-list" id="archive-dynamic-list">
		<!-- Dynamic content injected by archive.js -->
	</ul>
	
	<div id="archive-pagination" style="display: flex; gap: 16px; margin-top: 24px; align-items: center; justify-content: center;"></div>
</article>

<footer class="article-footer">
	<p data-i18n="arc.footer.line1">© 2026 Furrow Markets — Agricultural market intelligence</p>
	<p><a href="mailto:hello@furrowmarkets.com">hello@furrowmarkets.com</a> · <span data-i18n="arc.footer.line2">English · Русский</span></p>
</footer>

<script src="scripts/i18n-strings.js?v=2"></script>
<script src="scripts/i18n-archive-strings.js?v=2"></script>
<script src="scripts/i18n.js?v=2"></script>
<script src="scripts/archive-data.js?v=1"></script>
<script src="scripts/archive.js?v=1"></script>
<script src="scripts/furrow-analytics.js" defer></script>
</body>
</html>
