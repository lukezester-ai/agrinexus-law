<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Log In - AgriNexus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #faf7f0;
            --surface: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #666666;
            --border: rgba(0, 0, 0, 0.08);
            --green: #2d5a27;
            --terracotta: #cc4e36;
            --radius-md: 12px;
            --transition: all 0.2s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .auth-container {
            background: var(--surface);
            padding: 48px;
            border-radius: var(--radius-md);
            box-shadow: 0 12px 40px rgba(0,0,0,0.06);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 440px;
        }

        .logo {
            font-weight: 600;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
            color: var(--text-main);
            text-decoration: none;
        }

        .logo-dot {
            width: 10px;
            height: 10px;
            background-color: var(--green);
            border-radius: 50%;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            text-align: center;
        }

        p.subtitle {
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 32px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 15px;
            transition: var(--transition);
            outline: none;
        }

        input:focus {
            border-color: var(--green);
            box-shadow: 0 0 0 3px rgba(45, 90, 39, 0.1);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--text-main);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 12px;
        }

        .btn-primary:hover {
            background: #000;
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
            transform: none;
        }

        .auth-footer {
            margin-top: 24px;
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--text-main);
            font-weight: 500;
            text-decoration: none;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .error-message {
            color: var(--terracotta);
            font-size: 13px;
            margin-top: 12px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <a href="/" class="logo">
            <div class="logo-dot"></div>
            AgriNexus
        </a>
        
        <h1>Welcome back</h1>
        <p class="subtitle">Log in to access your farm's dashboard</p>
        
        <form id="login-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required autocomplete="current-password">
            </div>
            
            <div id="error-msg" class="error-message"></div>
            
            <button type="submit" id="submit-btn" class="btn-primary">Log In</button>
        </form>
        
        <div class="auth-footer">
            Don't have an account? <a href="/register.html">Sign up</a>
        </div>
    </div>

    <script src="/scripts/auth.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submit-btn');
            const errorMsg = document.getElementById('error-msg');
            
            btn.disabled = true;
            btn.textContent = 'Logging in...';
            errorMsg.style.display = 'none';
            
            const sb = await initSupabase();
            if (!sb) {
                errorMsg.textContent = 'System configuration error. Please try again later.';
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Log In';
                return;
            }
            
            const { data, error } = await sb.auth.signInWithPassword({
                email: email,
                password: password,
            });
            
            if (error) {
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Log In';
            } else {
                // Success
                window.location.href = '/dashboard.html';
            }
        });
    </script>
</body>
</html>
