services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: agrinexus
      POSTGRES_PASSWORD: agrinexus_dev
      POSTGRES_DB: agrinexus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/docker/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agrinexus -d agrinexus"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./apps/backend/rag
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://agrinexus:agrinexus_dev@db:5432/agrinexus
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
